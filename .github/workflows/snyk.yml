name: Snyk

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  SNYK_ORG: firassbennacib

jobs:
  snyk-access:
    name: Snyk Access
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      configured: ${{ steps.snyk-access.outputs.configured }}
    steps:
      - name: Validate Snyk access
        id: snyk-access
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "SNYK_TOKEN is not configured; skipping Snyk scans."
            exit 0
          fi

          if npx -y snyk whoami --org="${SNYK_ORG}" >/dev/null 2>&1; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::SNYK_TOKEN is configured, but Snyk rejected the token or organization access; skipping Snyk scans."
          fi

  snyk-open-source:
    name: Snyk Open Source
    needs: snyk-access
    if: needs.snyk-access.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tests/terratest/go.mod

      - name: Test Terratest module dependencies
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npx -y snyk test \
            --org="${SNYK_ORG}" \
            --file=tests/terratest/go.mod \
            --package-manager=gomodules

  snyk-code:
    name: Snyk Code
    needs: snyk-access
    if: needs.snyk-access.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test repository source code
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npx -y snyk code test \
            --org="${SNYK_ORG}" \
            --severity-threshold=medium

  snyk-iac:
    name: Snyk IaC
    needs: snyk-access
    if: needs.snyk-access.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test Terraform configuration
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npx -y snyk iac test . \
            --org="${SNYK_ORG}" \
            --severity-threshold=medium

  snyk-status:
    name: Snyk
    if: always()
    needs:
      - snyk-access
      - snyk-open-source
      - snyk-code
      - snyk-iac
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Snyk results
        run: |
          python3 - <<'PY'
          import json

          needs = json.loads(r'''${{ toJson(needs) }}''')
          failures = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          if failures:
              raise SystemExit(f"Snyk workflow failures: {failures}")
          if needs["snyk-access"].get("outputs", {}).get("configured") == "false":
              print("Snyk access is not configured or was rejected; Snyk scan jobs were skipped.")
          else:
              print("Snyk workflow passed.")
          PY
