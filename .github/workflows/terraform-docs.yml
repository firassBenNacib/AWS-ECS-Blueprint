name: Terraform Docs

on:
  pull_request:
    paths:
      - ".github/workflows/terraform-docs.yml"
      - ".scripts/terraform_docs_gate.sh"
      - ".tfdocs.yaml"
      - "modules/**"
      - "*.tf"
      - ".terraform.lock.hcl"
  push:
    paths:
      - ".github/workflows/terraform-docs.yml"
      - ".scripts/terraform_docs_gate.sh"
      - ".tfdocs.yaml"
      - "modules/**"
      - "*.tf"
      - ".terraform.lock.hcl"

permissions:
  contents: read

env:
  TERRAFORM_DOCS_VERSION: "v0.21.0"

jobs:
  terraform-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install terraform-docs
        run: |
          LOCAL_BIN_DIR="${RUNNER_TEMP}/terraform-docs-bin" bash .scripts/install_terraform_docs.sh
          echo "${RUNNER_TEMP}/terraform-docs-bin" >> "${GITHUB_PATH}"

      - name: Verify module documentation
        run: bash .scripts/terraform_docs_gate.sh check
