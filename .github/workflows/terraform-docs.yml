name: Terraform Docs

on:
  pull_request:
    paths:
      - ".github/workflows/terraform-docs.yml"
      - ".scripts/terraform_docs_gate.sh"
      - ".tfdocs.yaml"
      - "modules/**"
      - "*.tf"
      - ".terraform.lock.hcl"
  push:
    paths:
      - ".github/workflows/terraform-docs.yml"
      - ".scripts/terraform_docs_gate.sh"
      - ".tfdocs.yaml"
      - "modules/**"
      - "*.tf"
      - ".terraform.lock.hcl"

permissions:
  contents: read

env:
  TERRAFORM_DOCS_VERSION: "v0.21.0"

jobs:
  terraform-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install terraform-docs
        run: |
          curl -sSfL "https://github.com/terraform-docs/terraform-docs/releases/download/${TERRAFORM_DOCS_VERSION}/terraform-docs-${TERRAFORM_DOCS_VERSION}-linux-amd64.tar.gz" \
            -o "${RUNNER_TEMP}/terraform-docs.tar.gz"
          tar -xzf "${RUNNER_TEMP}/terraform-docs.tar.gz" -C "${RUNNER_TEMP}" terraform-docs
          install "${RUNNER_TEMP}/terraform-docs" /usr/local/bin/terraform-docs

      - name: Verify module documentation
        run: bash .scripts/terraform_docs_gate.sh check
