name: Deploy Terraform

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Terraform target to deploy"
        required: true
        default: "prod-app"
        type: choice
        options:
          - prod-app
          - nonprod-app
      tfvars_file:
        description: "Optional var-file override"
        required: false
        default: ""
      backend_config_file:
        description: "Optional backend config override"
        required: false
        default: ""
      apply_after_plan:
        description: "Apply the saved plan after approval"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "1"
  TF_CLI_ARGS_init: "-input=false -lock-timeout=5m"
  TF_CLI_ARGS_plan: "-input=false -lock-timeout=5m"
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
  TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
  TF_BACKEND_REGION: ${{ vars.TF_BACKEND_REGION }}

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
      count: ${{ steps.targets.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve Workflow Target Matrix
        id: targets
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            matrix="$(python3 .scripts/terraform_target_matrix.py \
              --mode single \
              --target "${{ github.event.inputs.target }}" \
              --tfvars-override "${{ github.event.inputs.tfvars_file }}" \
              --backend-override "${{ github.event.inputs.backend_config_file }}" \
              --output-format json)"
            count="$(python3 .scripts/terraform_target_matrix.py \
              --mode single \
              --target "${{ github.event.inputs.target }}" \
              --tfvars-override "${{ github.event.inputs.tfvars_file }}" \
              --backend-override "${{ github.event.inputs.backend_config_file }}" \
              --output-format count)"
          else
            matrix="$(python3 .scripts/terraform_target_matrix.py --mode changed --base-sha "${{ github.event.before }}" --head-sha "${{ github.sha }}" --output-format json)"
            count="$(python3 .scripts/terraform_target_matrix.py --mode changed --base-sha "${{ github.event.before }}" --head-sha "${{ github.sha }}" --output-format count)"
          fi
          {
            echo "matrix=${matrix}"
            echo "count=${count}"
          } >> "${GITHUB_OUTPUT}"

  plan:
    name: plan (${{ matrix.label }})
    if: needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Resolve Inputs
        id: resolve_inputs
        env:
          TFVARS_PROD_APP: ${{ secrets.TFVARS_PROD_APP }}
          TFVARS_NONPROD_APP: ${{ secrets.TFVARS_NONPROD_APP }}
        run: |
          tfvars_abs=""
          tfvars_source="repository"
          case "${{ matrix.slug }}" in
            prod-app)
              if [[ -n "${TFVARS_PROD_APP}" ]]; then
                tfvars_abs="${RUNNER_TEMP}/tfvars-prod-app.auto.tfvars"
                printf '%s' "${TFVARS_PROD_APP}" > "${tfvars_abs}"
                chmod 600 "${tfvars_abs}"
                tfvars_source="secret"
              fi
              ;;
            nonprod-app)
              if [[ -n "${TFVARS_NONPROD_APP}" ]]; then
                tfvars_abs="${RUNNER_TEMP}/tfvars-nonprod-app.auto.tfvars"
                printf '%s' "${TFVARS_NONPROD_APP}" > "${tfvars_abs}"
                chmod 600 "${tfvars_abs}"
                tfvars_source="secret"
              fi
              ;;
          esac

          if [[ -z "${tfvars_abs}" ]]; then
            tfvars_abs="$(realpath "${{ matrix.tfvars_file }}")"
          fi

          {
            echo "path=${{ matrix.path }}"
            echo "slug=${{ matrix.slug }}"
            echo "label=${{ matrix.label }}"
            echo "tfvars_abs=${tfvars_abs}"
            echo "tfvars_source=${tfvars_source}"
            if [[ -n "${{ matrix.backend_config_file }}" && -f "${{ matrix.backend_config_file }}" ]]; then
              echo "backend_cfg_abs=$(realpath "${{ matrix.backend_config_file }}")"
            else
              echo "backend_cfg_abs="
            fi
            echo "backend_key=${{ matrix.backend_key }}"
            echo "backend_region=${{ matrix.backend_region }}"
            echo "aws_region=${{ matrix.aws_region }}"
            echo "role_env_var=${{ matrix.role_env_var }}"
            echo "deploy_environment=${{ matrix.deploy_environment }}"
            echo "plan_artifact_name=terraform-summary-${{ matrix.slug }}"
            echo "result_artifact_name=terraform-plan-result-${{ matrix.slug }}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check Deploy Prerequisites
        id: deploy_prereqs
        env:
          AWS_ROLE_ARN_PROD_APP: ${{ secrets.AWS_ROLE_ARN_PROD_APP }}
          AWS_ROLE_ARN_NONPROD_APP: ${{ secrets.AWS_ROLE_ARN_NONPROD_APP }}
          TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
        run: |
          role_env_var="${{ steps.resolve_inputs.outputs.role_env_var }}"
          role_arn="$(printenv "${role_env_var}" || true)"

          if [[ -z "${role_arn}" ]]; then
            {
              echo "skip=true"
              echo "reason=Missing AWS role secret for ${{ steps.resolve_inputs.outputs.label }}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${{ steps.resolve_inputs.outputs.backend_cfg_abs }}" && -z "${TF_BACKEND_BUCKET}" ]]; then
            {
              echo "skip=true"
              echo "reason=Missing TF_BACKEND_BUCKET repo variable"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "skip=false"
            echo "reason="
          } >> "${GITHUB_OUTPUT}"

      - name: Configure AWS Credentials
        if: steps.deploy_prereqs.outputs.skip != 'true'
        uses: ./.github/actions/configure-aws-credentials
        with:
          role_env_var: ${{ steps.resolve_inputs.outputs.role_env_var }}
          role_label: ${{ steps.resolve_inputs.outputs.label }}
          aws_region: ${{ steps.resolve_inputs.outputs.aws_region }}
          aws_role_arn_prod_app: ${{ secrets.AWS_ROLE_ARN_PROD_APP }}
          aws_role_arn_nonprod_app: ${{ secrets.AWS_ROLE_ARN_NONPROD_APP }}

      - name: Create Saved Plan
        id: saved_plan
        continue-on-error: true
        run: |
          artifact_dir="${RUNNER_TEMP}/terraform-deploy-${{ steps.resolve_inputs.outputs.slug }}"
          mkdir -p "${artifact_dir}"
          result_json="${artifact_dir}/result.json"
          plan_txt="${artifact_dir}/tfplan.txt"
          summary_txt="${artifact_dir}/summary.txt"
          plan_bin="${artifact_dir}/tfplan"
          plan_json="${artifact_dir}/tfplan.json"

          {
            echo "# Terraform deploy plan summary for ${{ steps.resolve_inputs.outputs.label }}"
            echo
            echo "tfvars source: ${{ steps.resolve_inputs.outputs.tfvars_source }}"
            echo
          } > "${summary_txt}"

          if [[ "${{ steps.deploy_prereqs.outputs.skip }}" == "true" ]]; then
            {
              echo "status: skipped"
              echo "reason: ${{ steps.deploy_prereqs.outputs.reason }}"
            } >> "${summary_txt}"
            python3 .scripts/write_json_result.py \
              --output "${result_json}" \
              --set path "${{ steps.resolve_inputs.outputs.path }}" \
              --set slug "${{ steps.resolve_inputs.outputs.slug }}" \
              --set label "${{ steps.resolve_inputs.outputs.label }}" \
              --set tfvars_file "${{ matrix.tfvars_file }}" \
              --set backend_config_file "${{ matrix.backend_config_file }}" \
              --set backend_key "${{ steps.resolve_inputs.outputs.backend_key }}" \
              --set backend_region "${{ steps.resolve_inputs.outputs.backend_region }}" \
              --set aws_region "${{ steps.resolve_inputs.outputs.aws_region }}" \
              --set role_env_var "${{ steps.resolve_inputs.outputs.role_env_var }}" \
              --set deploy_environment "${{ steps.resolve_inputs.outputs.deploy_environment }}" \
              --set status "skipped" \
              --set artifact_name "${{ steps.resolve_inputs.outputs.plan_artifact_name }}"
            exit 0
          fi

          if [[ ! -f "${{ steps.resolve_inputs.outputs.tfvars_abs }}" ]]; then
            {
              echo "status: error"
              echo "details: Resolved tfvars file does not exist: ${{ steps.resolve_inputs.outputs.tfvars_abs }}"
            } >> "${summary_txt}"
            python3 .scripts/write_json_result.py \
              --output "${result_json}" \
              --set path "${{ steps.resolve_inputs.outputs.path }}" \
              --set slug "${{ steps.resolve_inputs.outputs.slug }}" \
              --set label "${{ steps.resolve_inputs.outputs.label }}" \
              --set tfvars_file "${{ matrix.tfvars_file }}" \
              --set backend_config_file "${{ matrix.backend_config_file }}" \
              --set backend_key "${{ steps.resolve_inputs.outputs.backend_key }}" \
              --set backend_region "${{ steps.resolve_inputs.outputs.backend_region }}" \
              --set aws_region "${{ steps.resolve_inputs.outputs.aws_region }}" \
              --set role_env_var "${{ steps.resolve_inputs.outputs.role_env_var }}" \
              --set deploy_environment "${{ steps.resolve_inputs.outputs.deploy_environment }}" \
              --set status "error" \
              --set artifact_name "${{ steps.resolve_inputs.outputs.plan_artifact_name }}"
            exit 1
          fi

          init_args=()
          if [[ -n "${{ steps.resolve_inputs.outputs.backend_cfg_abs }}" ]]; then
            init_args+=("-backend-config=${{ steps.resolve_inputs.outputs.backend_cfg_abs }}")
          else
            if [[ -z "${TF_BACKEND_BUCKET}" ]]; then
              {
                echo "status: error"
                echo "details: Missing TF_BACKEND_BUCKET repo variable"
              } >> "${summary_txt}"
              python3 .scripts/write_json_result.py \
                --output "${result_json}" \
                --set path "${{ steps.resolve_inputs.outputs.path }}" \
                --set slug "${{ steps.resolve_inputs.outputs.slug }}" \
                --set label "${{ steps.resolve_inputs.outputs.label }}" \
                --set tfvars_file "${{ matrix.tfvars_file }}" \
                --set backend_config_file "${{ matrix.backend_config_file }}" \
                --set backend_key "${{ steps.resolve_inputs.outputs.backend_key }}" \
                --set backend_region "${{ steps.resolve_inputs.outputs.backend_region }}" \
                --set aws_region "${{ steps.resolve_inputs.outputs.aws_region }}" \
                --set role_env_var "${{ steps.resolve_inputs.outputs.role_env_var }}" \
                --set deploy_environment "${{ steps.resolve_inputs.outputs.deploy_environment }}" \
                --set status "error" \
                --set artifact_name "${{ steps.resolve_inputs.outputs.plan_artifact_name }}"
              exit 1
            fi
            backend_region="${TF_BACKEND_REGION:-${{ steps.resolve_inputs.outputs.backend_region }}}"
            init_args+=("-backend-config=bucket=${TF_BACKEND_BUCKET}")
            init_args+=("-backend-config=key=${{ steps.resolve_inputs.outputs.backend_key }}")
            init_args+=("-backend-config=region=${backend_region}")
            init_args+=("-backend-config=encrypt=true")
          fi

          if ! terraform -chdir="${{ steps.resolve_inputs.outputs.path }}" init "${init_args[@]}" > "${plan_txt}" 2>&1; then
            {
              echo "status: error"
              echo "details: Terraform init failed. Full output is intentionally not uploaded for this public repository. Use the workflow logs for diagnostics."
            } >> "${summary_txt}"
            python3 .scripts/write_json_result.py \
              --output "${result_json}" \
              --set path "${{ steps.resolve_inputs.outputs.path }}" \
              --set slug "${{ steps.resolve_inputs.outputs.slug }}" \
              --set label "${{ steps.resolve_inputs.outputs.label }}" \
              --set tfvars_file "${{ matrix.tfvars_file }}" \
              --set backend_config_file "${{ matrix.backend_config_file }}" \
              --set backend_key "${{ steps.resolve_inputs.outputs.backend_key }}" \
              --set backend_region "${{ steps.resolve_inputs.outputs.backend_region }}" \
              --set aws_region "${{ steps.resolve_inputs.outputs.aws_region }}" \
              --set role_env_var "${{ steps.resolve_inputs.outputs.role_env_var }}" \
              --set deploy_environment "${{ steps.resolve_inputs.outputs.deploy_environment }}" \
              --set status "error" \
              --set artifact_name "${{ steps.resolve_inputs.outputs.plan_artifact_name }}"
            exit 1
          fi

          set +e
          terraform -chdir="${{ steps.resolve_inputs.outputs.path }}" plan -input=false -out="${plan_bin}" -var-file="${{ steps.resolve_inputs.outputs.tfvars_abs }}" >> "${plan_txt}" 2>&1
          exit_code=$?
          set -e

          if [[ "${exit_code}" -eq 0 ]]; then
            terraform -chdir="${{ steps.resolve_inputs.outputs.path }}" show -no-color "${plan_bin}" > "${plan_txt}.rendered"
            mv "${plan_txt}.rendered" "${plan_txt}"
            terraform -chdir="${{ steps.resolve_inputs.outputs.path }}" show -json "${plan_bin}" > "${plan_json}"
            counts="$(python3 .scripts/extract_terraform_plan_counts.py "${plan_txt}")"
            read -r add change destroy <<< "${counts}"
            {
              echo "status: plan_ready"
              echo "add: ${add}"
              echo "change: ${change}"
              echo "destroy: ${destroy}"
            } >> "${summary_txt}"
            python3 .scripts/write_json_result.py \
              --output "${result_json}" \
              --set path "${{ steps.resolve_inputs.outputs.path }}" \
              --set slug "${{ steps.resolve_inputs.outputs.slug }}" \
              --set label "${{ steps.resolve_inputs.outputs.label }}" \
              --set tfvars_file "${{ matrix.tfvars_file }}" \
              --set backend_config_file "${{ matrix.backend_config_file }}" \
              --set backend_key "${{ steps.resolve_inputs.outputs.backend_key }}" \
              --set backend_region "${{ steps.resolve_inputs.outputs.backend_region }}" \
              --set aws_region "${{ steps.resolve_inputs.outputs.aws_region }}" \
              --set role_env_var "${{ steps.resolve_inputs.outputs.role_env_var }}" \
              --set deploy_environment "${{ steps.resolve_inputs.outputs.deploy_environment }}" \
              --set tfvars_source "${{ steps.resolve_inputs.outputs.tfvars_source }}" \
              --set status "plan_ready" \
              --set artifact_name "${{ steps.resolve_inputs.outputs.plan_artifact_name }}"
            exit 0
          fi

          {
            echo "status: error"
            echo "details: Terraform plan failed. Full output is intentionally not uploaded for this public repository. Use the workflow logs for diagnostics."
          } >> "${summary_txt}"
          python3 .scripts/write_json_result.py \
            --output "${result_json}" \
            --set path "${{ steps.resolve_inputs.outputs.path }}" \
            --set slug "${{ steps.resolve_inputs.outputs.slug }}" \
            --set label "${{ steps.resolve_inputs.outputs.label }}" \
            --set tfvars_file "${{ matrix.tfvars_file }}" \
            --set backend_config_file "${{ matrix.backend_config_file }}" \
            --set backend_key "${{ steps.resolve_inputs.outputs.backend_key }}" \
            --set backend_region "${{ steps.resolve_inputs.outputs.backend_region }}" \
            --set aws_region "${{ steps.resolve_inputs.outputs.aws_region }}" \
            --set role_env_var "${{ steps.resolve_inputs.outputs.role_env_var }}" \
            --set deploy_environment "${{ steps.resolve_inputs.outputs.deploy_environment }}" \
            --set tfvars_source "${{ steps.resolve_inputs.outputs.tfvars_source }}" \
            --set status "error" \
            --set artifact_name "${{ steps.resolve_inputs.outputs.plan_artifact_name }}"
          exit 1

      - name: Advisory Trivy Plan Scan
        if: always() && vars.ENABLE_TRIVY_PLAN != 'false' && steps.saved_plan.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # 0.24.0
        with:
          scan-type: "config"
          scan-ref: "${{ runner.temp }}/terraform-deploy-${{ steps.resolve_inputs.outputs.slug }}/tfplan.json"
          format: "json"
          output: "${{ runner.temp }}/terraform-deploy-${{ steps.resolve_inputs.outputs.slug }}/trivy-plan.json"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          hide-progress: true

      - name: Upload Plan Summary Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.resolve_inputs.outputs.plan_artifact_name }}
          retention-days: 30
          path: ${{ runner.temp }}/terraform-deploy-${{ steps.resolve_inputs.outputs.slug }}/summary.txt
          if-no-files-found: ignore

      - name: Upload Plan Result Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.resolve_inputs.outputs.result_artifact_name }}
          retention-days: 30
          path: ${{ runner.temp }}/terraform-deploy-${{ steps.resolve_inputs.outputs.slug }}/result.json
          if-no-files-found: ignore

  collect-plan-results:
    if: always() && needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
      - plan
    runs-on: ubuntu-latest
    outputs:
      apply_matrix: ${{ steps.collect.outputs.apply_matrix }}
      apply_count: ${{ steps.collect.outputs.apply_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Plan Result Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: terraform-plan-result-*
          merge-multiple: true
          path: deploy-results

      - name: Build Apply Matrix
        id: collect
        run: |
          python3 .scripts/build_apply_matrix.py \
            --results-dir deploy-results \
            --github-output "${GITHUB_OUTPUT}"

  apply:
    name: apply (${{ matrix.label }})
    if: always() && needs.collect-plan-results.outputs.apply_count != '0' && (github.event.inputs.apply_after_plan == 'true' || github.event.inputs.apply_after_plan == true)
    needs:
      - resolve-targets
      - plan
      - collect-plan-results
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.collect-plan-results.outputs.apply_matrix) }}
    concurrency:
      group: terraform-apply-${{ matrix.slug }}
      cancel-in-progress: false
    environment: ${{ matrix.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Resolve Apply Inputs
        id: resolve_inputs
        env:
          TFVARS_PROD_APP: ${{ secrets.TFVARS_PROD_APP }}
          TFVARS_NONPROD_APP: ${{ secrets.TFVARS_NONPROD_APP }}
        run: |
          tfvars_abs=""
          case "${{ matrix.slug }}" in
            prod-app)
              if [[ -n "${TFVARS_PROD_APP}" ]]; then
                tfvars_abs="${RUNNER_TEMP}/tfvars-prod-app.auto.tfvars"
                printf '%s' "${TFVARS_PROD_APP}" > "${tfvars_abs}"
                chmod 600 "${tfvars_abs}"
              fi
              ;;
            nonprod-app)
              if [[ -n "${TFVARS_NONPROD_APP}" ]]; then
                tfvars_abs="${RUNNER_TEMP}/tfvars-nonprod-app.auto.tfvars"
                printf '%s' "${TFVARS_NONPROD_APP}" > "${tfvars_abs}"
                chmod 600 "${tfvars_abs}"
              fi
              ;;
          esac

          if [[ -z "${tfvars_abs}" ]]; then
            tfvars_abs="$(realpath "${{ matrix.tfvars_file }}")"
          fi

          echo "tfvars_abs=${tfvars_abs}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          role_env_var: ${{ matrix.role_env_var }}
          role_label: ${{ matrix.label }}
          aws_region: ${{ matrix.aws_region }}
          aws_role_arn_prod_app: ${{ secrets.AWS_ROLE_ARN_PROD_APP }}
          aws_role_arn_nonprod_app: ${{ secrets.AWS_ROLE_ARN_NONPROD_APP }}

      - name: Create Approved Plan
        id: approved_plan
        run: |
          if [[ ! -f "${{ steps.resolve_inputs.outputs.tfvars_abs }}" ]]; then
            echo "Resolved tfvars file does not exist: ${{ steps.resolve_inputs.outputs.tfvars_abs }}"
            exit 1
          fi

          init_args=()
          if [[ -n "${{ matrix.backend_config_file }}" && -f "${{ matrix.backend_config_file }}" ]]; then
            init_args+=("-backend-config=${{ matrix.backend_config_file }}")
          else
            test -n "${TF_BACKEND_BUCKET}" || (echo "Missing TF_BACKEND_BUCKET repo variable" && exit 1)
            backend_region="${TF_BACKEND_REGION:-${{ matrix.backend_region }}}"
            init_args+=("-backend-config=bucket=${TF_BACKEND_BUCKET}")
            init_args+=("-backend-config=key=${{ matrix.backend_key }}")
            init_args+=("-backend-config=region=${backend_region}")
            init_args+=("-backend-config=encrypt=true")
          fi

          terraform -chdir="${{ matrix.path }}" init "${init_args[@]}"
          set +e
          terraform -chdir="${{ matrix.path }}" plan -detailed-exitcode -input=false -out="${RUNNER_TEMP}/approved-plan-${{ matrix.slug }}" -var-file="${{ steps.resolve_inputs.outputs.tfvars_abs }}"
          exit_code=$?
          set -e

          if [[ "${exit_code}" -eq 0 ]]; then
            echo "apply_skip=true" >> "${GITHUB_OUTPUT}"
            echo "No changes remain to apply."
            exit 0
          fi

          if [[ "${exit_code}" -ne 2 ]]; then
            exit "${exit_code}"
          fi

          echo "apply_skip=false" >> "${GITHUB_OUTPUT}"

      - name: Apply Approved Plan
        if: steps.approved_plan.outputs.apply_skip != 'true'
        run: |
          terraform -chdir="${{ matrix.path }}" apply -input=false "${RUNNER_TEMP}/approved-plan-${{ matrix.slug }}"
