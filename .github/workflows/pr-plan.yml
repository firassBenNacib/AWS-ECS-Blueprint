name: Plan Terraform Changes

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "img/**"
      - ".github/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "ci/**"
      - "modules/**"
      - ".scripts/**"
      - "prod-app/**"
      - "nonprod-app/**"
      - "*.tf"
      - "*.tfvars"
      - "*.tfvars.example"
      - "*.hcl"
      - "*.hcl.example"
      - ".terraform.lock.hcl"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: "1"
  TF_CLI_ARGS_init: "-input=false -lock-timeout=5m"
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
  TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
  TF_BACKEND_REGION: ${{ vars.TF_BACKEND_REGION }}

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
      count: ${{ steps.targets.outputs.count }}
      same_repo: ${{ steps.repo.outputs.same_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check PR Trust Boundary
        id: repo
        run: echo "same_repo=${{ github.event.pull_request.head.repo.full_name == github.repository }}" >> "${GITHUB_OUTPUT}"

      - name: Resolve Changed Targets
        id: targets
        run: |
          if [[ "${{ steps.repo.outputs.same_repo }}" == "true" ]]; then
            matrix="$(python3 .scripts/terraform_target_matrix.py --mode changed --base-sha "${{ github.event.pull_request.base.sha }}" --head-sha "${{ github.event.pull_request.head.sha }}" --output-format json)"
            count="$(python3 .scripts/terraform_target_matrix.py --mode changed --base-sha "${{ github.event.pull_request.base.sha }}" --head-sha "${{ github.event.pull_request.head.sha }}" --output-format count)"
          else
            matrix='{"include":[]}'
            count='0'
          fi
          {
            echo "matrix=${matrix}"
            echo "count=${count}"
          } >> "${GITHUB_OUTPUT}"

  plan:
    name: plan (${{ matrix.label }})
    if: needs.resolve-targets.outputs.same_repo == 'true' && needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Resolve Inputs
        id: resolve_inputs
        env:
          TFVARS_PROD_APP: ${{ secrets.TFVARS_PROD_APP }}
          TFVARS_NONPROD_APP: ${{ secrets.TFVARS_NONPROD_APP }}
        run: |
          tfvars_source="repository"
          tfvars_abs="$(realpath "${{ matrix.tfvars_file }}")"
          tfvars_env_var="${{ matrix.tfvars_env_var }}"
          tfvars_secret="$(printenv "${tfvars_env_var}" || true)"
          legacy_adjustments=""

          if [[ -n "${tfvars_secret}" ]]; then
            tfvars_source="github-secret"
            tfvars_abs="${RUNNER_TEMP}/${{ matrix.slug }}.tfvars"
            printf '%s\n' "${tfvars_secret}" > "${tfvars_abs}"
            legacy_adjustments="$(python3 .scripts/normalize_legacy_tfvars_for_ci.py "${tfvars_abs}")"

            if [[ -n "${legacy_adjustments}" ]]; then
              echo "::warning::Adjusted legacy tfvars for ${{ matrix.label }}: ${legacy_adjustments}"
            fi
          fi

          {
            echo "path=${{ matrix.path }}"
            echo "slug=${{ matrix.slug }}"
            echo "label=${{ matrix.label }}"
            echo "tfvars_abs=${tfvars_abs}"
            echo "tfvars_source=${tfvars_source}"
            echo "legacy_adjustments=${legacy_adjustments}"
            if [[ -f "${{ matrix.backend_config_file }}" ]]; then
              echo "backend_cfg_abs=$(realpath "${{ matrix.backend_config_file }}")"
            else
              echo "backend_cfg_abs="
            fi
            echo "backend_key=${{ matrix.backend_key }}"
            echo "backend_region=${{ matrix.backend_region }}"
            echo "aws_region=${{ matrix.aws_region }}"
            echo "role_env_var=${{ matrix.role_env_var }}"
            echo "plan_artifact_name=terraform-pr-plan-${{ matrix.slug }}"
            echo "result_artifact_name=terraform-pr-result-${{ matrix.slug }}"
            echo "cost_artifact_name=terraform-pr-cost-${{ matrix.slug }}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check Speculative Plan Prerequisites
        id: plan_prereqs
        env:
          AWS_ROLE_ARN_PROD_APP: ${{ secrets.AWS_ROLE_ARN_PROD_APP }}
          AWS_ROLE_ARN_NONPROD_APP: ${{ secrets.AWS_ROLE_ARN_NONPROD_APP }}
          TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
        run: |
          role_env_var="${{ steps.resolve_inputs.outputs.role_env_var }}"
          role_arn="$(printenv "${role_env_var}" || true)"

          if [[ -z "${role_arn}" ]]; then
            {
              echo "skip=true"
              echo "reason=Missing AWS role secret for ${{ steps.resolve_inputs.outputs.label }}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${{ steps.resolve_inputs.outputs.backend_cfg_abs }}" && -z "${TF_BACKEND_BUCKET}" ]]; then
            {
              echo "skip=true"
              echo "reason=Missing TF_BACKEND_BUCKET repo variable"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "skip=false"
            echo "reason="
          } >> "${GITHUB_OUTPUT}"

      - name: Configure AWS Credentials
        if: steps.plan_prereqs.outputs.skip != 'true'
        uses: ./.github/actions/configure-aws-credentials
        with:
          role_env_var: ${{ steps.resolve_inputs.outputs.role_env_var }}
          role_label: ${{ steps.resolve_inputs.outputs.label }}
          aws_region: ${{ steps.resolve_inputs.outputs.aws_region }}
          aws_role_arn_prod_app: ${{ secrets.AWS_ROLE_ARN_PROD_APP }}
          aws_role_arn_nonprod_app: ${{ secrets.AWS_ROLE_ARN_NONPROD_APP }}

      - name: Check Infracost Prerequisites
        id: cost_prereqs
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          if [[ -z "${INFRACOST_API_KEY}" ]]; then
            {
              echo "skip=true"
              echo "reason=Missing INFRACOST_API_KEY secret"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "skip=false"
            echo "reason="
          } >> "${GITHUB_OUTPUT}"

      - name: Setup Infracost
        if: steps.cost_prereqs.outputs.skip != 'true'
        uses: infracost/actions/setup@d51fc54d23c9ad90f984b884257bd96dc2625067 # v4.1.0
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
          currency: USD

      - name: Generate Speculative Plan
        id: speculative_plan
        run: |
          artifact_dir="${RUNNER_TEMP}/terraform-pr-plan-${{ steps.resolve_inputs.outputs.slug }}"
          mkdir -p "${artifact_dir}"
          plan_txt="${artifact_dir}/tfplan.txt"
          plan_bin="${artifact_dir}/tfplan.binary"
          plan_json="${artifact_dir}/tfplan.json"
          cost_json="${artifact_dir}/infracost.json"
          result_json="${artifact_dir}/result.json"
          status="error"
          add="null"
          change="null"
          destroy="null"
          cost_status="not_run"
          cost_reason="null"
          monthly_cost="null"
          past_monthly_cost="null"
          monthly_cost_delta="null"
          exit_code=1

          {
            echo "# Terraform speculative plan for ${{ steps.resolve_inputs.outputs.label }}"
            echo
            echo "tfvars source: ${{ steps.resolve_inputs.outputs.tfvars_source }}"
            if [[ -n "${{ steps.resolve_inputs.outputs.legacy_adjustments }}" ]]; then
              echo "legacy adjustments: ${{ steps.resolve_inputs.outputs.legacy_adjustments }}"
            fi
            echo
          } > "${plan_txt}"

          if [[ "${{ steps.plan_prereqs.outputs.skip }}" == "true" ]]; then
            echo "${{ steps.plan_prereqs.outputs.reason }}" >> "${plan_txt}"
            status="skipped"
            cost_status="skipped"
            cost_reason="${{ steps.plan_prereqs.outputs.reason }}"
            exit_code=0
          else
            init_args=()
            if [[ -n "${{ steps.resolve_inputs.outputs.backend_cfg_abs }}" ]]; then
              init_args+=("-backend-config=${{ steps.resolve_inputs.outputs.backend_cfg_abs }}")
            else
              if [[ -z "${TF_BACKEND_BUCKET}" ]]; then
                echo "Missing TF_BACKEND_BUCKET repo variable" >> "${plan_txt}"
              else
                backend_region="${TF_BACKEND_REGION:-${{ steps.resolve_inputs.outputs.backend_region }}}"
                init_args+=("-backend-config=bucket=${TF_BACKEND_BUCKET}")
                init_args+=("-backend-config=key=${{ steps.resolve_inputs.outputs.backend_key }}")
                init_args+=("-backend-config=region=${backend_region}")
                init_args+=("-backend-config=encrypt=true")
              fi
            fi

            if [[ -n "${init_args[*]}" ]] && terraform -chdir="${{ steps.resolve_inputs.outputs.path }}" init "${init_args[@]}" >> "${plan_txt}" 2>&1; then
              set +e
              terraform -chdir="${{ steps.resolve_inputs.outputs.path }}" plan -out="${plan_bin}" -detailed-exitcode -input=false -lock-timeout=5m -no-color -var-file="${{ steps.resolve_inputs.outputs.tfvars_abs }}" >> "${plan_txt}" 2>&1
              exit_code=$?
              set -e

              counts="$(python3 .scripts/extract_terraform_plan_counts.py "${plan_txt}")"
              read -r parsed_add parsed_change parsed_destroy <<< "${counts}"

              if [[ "${exit_code}" -eq 0 ]]; then
                if (( parsed_add > 0 || parsed_change > 0 || parsed_destroy > 0 )); then
                  status="changes"
                  add="${parsed_add}"
                  change="${parsed_change}"
                  destroy="${parsed_destroy}"
                  echo "::warning::terraform plan returned exit code 0 for ${{ steps.resolve_inputs.outputs.label }}, but the plan text contains changes. Falling back to parsed plan counts." >> "${plan_txt}"
                else
                  status="no_changes"
                  add=0
                  change=0
                  destroy=0
                fi
              elif [[ "${exit_code}" -eq 2 ]]; then
                status="changes"
                add="${parsed_add}"
                change="${parsed_change}"
                destroy="${parsed_destroy}"
              fi

              if [[ "${status}" == "changes" || "${status}" == "no_changes" ]]; then
                if terraform -chdir="${{ steps.resolve_inputs.outputs.path }}" show -json "${plan_bin}" > "${plan_json}"; then
                  if [[ "${{ steps.cost_prereqs.outputs.skip }}" == "true" ]]; then
                    cost_status="skipped"
                    cost_reason="${{ steps.cost_prereqs.outputs.reason }}"
                    echo "Skipping Infracost: ${{ steps.cost_prereqs.outputs.reason }}" >> "${plan_txt}"
                  else
                    if infracost diff --path "${plan_json}" --format json --out-file "${cost_json}" >> "${plan_txt}" 2>&1; then
                      read -r monthly_cost past_monthly_cost monthly_cost_delta <<< "$(python3 .scripts/extract_infracost_summary.py "${cost_json}")"
                      cost_status="estimated"
                      if [[ "${status}" == "no_changes" ]]; then
                        past_monthly_cost="${monthly_cost}"
                        monthly_cost_delta="0"
                      fi
                    else
                      cost_status="error"
                      cost_reason="Infracost diff failed"
                    fi
                  fi
                else
                  status="error"
                  cost_status="error"
                  cost_reason="terraform show -json failed"
                fi
              fi
            fi
          fi

          python3 .scripts/write_json_result.py \
            --output "${result_json}" \
            --set label "${{ steps.resolve_inputs.outputs.label }}" \
            --set slug "${{ steps.resolve_inputs.outputs.slug }}" \
            --set status "${status}" \
            --set cost_status "${cost_status}" \
            --set-nullable-string cost_reason "${cost_reason}" \
            --set-nullable-int add "${add}" \
            --set-nullable-int change "${change}" \
            --set-nullable-int destroy "${destroy}" \
            --set-nullable-float monthly_cost "${monthly_cost}" \
            --set-nullable-float past_monthly_cost "${past_monthly_cost}" \
            --set-nullable-float monthly_cost_delta "${monthly_cost_delta}" \
            --set plan_artifact_name "${{ steps.resolve_inputs.outputs.plan_artifact_name }}" \
            --set result_artifact_name "${{ steps.resolve_inputs.outputs.result_artifact_name }}" \
            --set cost_artifact_name "${{ steps.resolve_inputs.outputs.cost_artifact_name }}"
          {
            echo "status=${status}"
            echo "exit_code=${exit_code}"
            echo "cost_status=${cost_status}"
          } >> "${GITHUB_OUTPUT}"

          if [[ "${status}" == "error" ]]; then
            exit 1
          fi

      - name: Upload Speculative Plan Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.resolve_inputs.outputs.plan_artifact_name }}
          retention-days: 14
          path: ${{ runner.temp }}/terraform-pr-plan-${{ steps.resolve_inputs.outputs.slug }}/tfplan.txt
          if-no-files-found: ignore

      - name: Upload PR Result Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.resolve_inputs.outputs.result_artifact_name }}
          retention-days: 14
          path: ${{ runner.temp }}/terraform-pr-plan-${{ steps.resolve_inputs.outputs.slug }}/result.json
          if-no-files-found: ignore

      - name: Upload Infracost Artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.resolve_inputs.outputs.cost_artifact_name }}
          retention-days: 14
          path: ${{ runner.temp }}/terraform-pr-plan-${{ steps.resolve_inputs.outputs.slug }}/infracost.json
          if-no-files-found: ignore

  comment:
    if: always() && needs.resolve-targets.outputs.same_repo == 'true' && needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
      - plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download PR Result Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: terraform-pr-result-*
          path: pr-results

      - name: Render PR Summary
        run: |
          python3 .scripts/render_terraform_pr_summary.py \
            --results-dir pr-results \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --checks-url "${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}/checks" \
            > pr-comment.md

      - name: Update Sticky PR Comment
        run: |
          python3 .scripts/update_github_pr_comment.py \
            --pr-number "${{ github.event.pull_request.number }}" \
            --marker "<!-- terraform-pr-plan -->" \
            --body-file pr-comment.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  plan-status:
    name: Plan Terraform Changes
    if: always()
    needs:
      - resolve-targets
      - plan
      - comment
    runs-on: ubuntu-latest
    steps:
      - name: Download PR Result Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: terraform-pr-result-*
          path: pr-results

      - name: Evaluate plan workflow result
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          needs = json.loads(r'''${{ toJson(needs) }}''')
          failures = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          result_errors = []
          for path in sorted(Path("pr-results").rglob("*.json")):
              data = json.loads(path.read_text())
              if data.get("status") == "error":
                  result_errors.append(data.get("label", path.name))
          if failures:
              raise SystemExit(f"Plan workflow failures: {failures}")
          if result_errors:
              raise SystemExit(f"Speculative plan errors: {result_errors}")
          print("Plan workflow passed.")
          PY
