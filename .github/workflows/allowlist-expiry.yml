name: Allowlist Expiry Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  allowlist-expiry-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Upcoming Allowlist Expiry
        run: bash .scripts/check_allowlist_expiry_window.sh ci/allowlists 14
