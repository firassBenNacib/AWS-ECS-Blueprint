name: Allowlist Expiry Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  allowlist-expiry-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check Upcoming Allowlist Expiry
        run: bash .scripts/check_allowlist_expiry_window.sh ci/allowlists 14
