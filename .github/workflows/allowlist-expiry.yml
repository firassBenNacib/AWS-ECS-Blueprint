name: Allowlist Expiry Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  allowlist-expiry-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check Upcoming Allowlist Expiry
        run: bash .scripts/check_allowlist_expiry_window.sh ci/allowlists 14
