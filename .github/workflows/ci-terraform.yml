name: Terraform CI

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "img/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "ci/**"
      - "modules/**"
      - ".scripts/**"
      - "prod-app/**"
      - "nonprod-app/**"
      - "live-validation-bootstrap/**"
      - "*.tf"
      - "*.tfvars"
      - "*.tfvars.example"
      - "*.hcl"
      - "*.hcl.example"
      - ".terraform.lock.hcl"
  push:
    paths:
      - "README.md"
      - "docs/**"
      - "img/**"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "ci/**"
      - "modules/**"
      - ".scripts/**"
      - "prod-app/**"
      - "nonprod-app/**"
      - "live-validation-bootstrap/**"
      - "*.tf"
      - "*.tfvars"
      - "*.tfvars.example"
      - "*.hcl"
      - "*.hcl.example"
      - ".terraform.lock.hcl"

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "1"
  TF_CLI_ARGS_init: "-input=false -lock-timeout=5m"
  TF_CLI_ARGS_plan: "-input=false -lock-timeout=5m"
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
  TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
  TF_BACKEND_REGION: ${{ vars.TF_BACKEND_REGION }}
  CHECKOV_VERSION: "3.2.507"
  TFSEC_VERSION: "v1.28.14"
  TERRASCAN_VERSION: "1.19.9"

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
      count: ${{ steps.targets.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve full target matrix
        id: targets
        run: |
          matrix="$(python3 .scripts/terraform_target_matrix.py --mode full --output-format json)"
          count="$(python3 .scripts/terraform_target_matrix.py --mode full --output-format count)"
          {
            echo "matrix=${matrix}"
            echo "count=${count}"
          } >> "${GITHUB_OUTPUT}"

  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
        with:
          enable-plugin-cache: "false"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shellcheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          mapfile -t shell_scripts < <(find .scripts -maxdepth 1 -type f -name '*.sh' | sort)
          if [[ ${#shell_scripts[@]} -eq 0 ]]; then
            echo "No shell scripts found."
            exit 0
          fi
          shellcheck "${shell_scripts[@]}"

  root-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check root parity
        run: python3 .scripts/check_root_parity.py

  terraform-validate:
    name: terraform-validate (${{ matrix.label }})
    if: needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Terraform validate with local wrapper
        run: bash .scripts/validate_targets.sh "${{ matrix.path }}"

  terraform-validate-modules:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Terraform validate modules with local wrapper
        run: bash .scripts/validate_modules.sh

  terraform-validate-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Terraform validate live-validation bootstrap
        run: bash .scripts/validate_targets.sh "live-validation-bootstrap"

  terraform-test:
    name: terraform-test (${{ matrix.path }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: modules/alb
          - path: modules/application_platform
          - path: modules/backup_baseline
          - path: modules/budget_alerts
          - path: modules/ecr
          - path: modules/ecs_backend
          - path: modules/network
          - path: modules/rds
          - path: modules/s3
          - path: modules/security_baseline
          - path: modules/security_groups
          - path: modules/ecs_service
          - path: modules/guardduty_member_detector
          - path: modules/cloudfront_frontend
          - path: modules/cloudfront_backend
          - path: prod-app
          - path: nonprod-app
          - path: live-validation-bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
        with:
          enable-plugin-cache: "false"

      - name: Terraform test with local wrapper
        shell: bash
        run: |
          case "${{ matrix.path }}" in
            prod-app|nonprod-app|live-validation-bootstrap)
              bash .scripts/test_roots.sh "${{ matrix.path }}"
              ;;
            modules/*)
              bash .scripts/test_modules.sh "$(basename "${{ matrix.path }}")"
              ;;
            *)
              echo "Unsupported Terraform test path: ${{ matrix.path }}" >&2
              exit 1
              ;;
          esac

  terraform-tag-report:
    name: terraform-tag-report (${{ matrix.label }})
    if: needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Check tag report prerequisites
        id: tag_prereqs
        env:
          AWS_ROLE_ARN_PROD_APP: ${{ secrets.AWS_ROLE_ARN_PROD_APP }}
          AWS_ROLE_ARN_NONPROD_APP: ${{ secrets.AWS_ROLE_ARN_NONPROD_APP }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            {
              echo "skip=true"
              echo "reason=Skipping tag report for fork pull requests because AWS role secrets are not available."
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && ( "${GITHUB_REF_NAME}" == dependabot/* || "${GITHUB_ACTOR}" == "dependabot[bot]" ) ]]; then
            {
              echo "skip=true"
              echo "reason=Skipping tag report for Dependabot push branches because AWS OIDC trust does not include bot refs."
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          role_env_var="${{ matrix.role_env_var }}"
          role_arn="$(printenv "${role_env_var}" || true)"

          if [[ -z "${role_arn}" ]]; then
            {
              echo "skip=true"
              echo "reason=Missing AWS role secret for ${{ matrix.label }}."
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "skip=false"
            echo "reason="
          } >> "${GITHUB_OUTPUT}"

      - name: Configure AWS Credentials
        if: steps.tag_prereqs.outputs.skip != 'true'
        uses: ./.github/actions/configure-aws-credentials
        with:
          role_env_var: ${{ matrix.role_env_var }}
          role_label: ${{ matrix.label }}
          aws_region: ${{ matrix.aws_region }}
          aws_role_arn_prod_app: ${{ secrets.AWS_ROLE_ARN_PROD_APP }}
          aws_role_arn_nonprod_app: ${{ secrets.AWS_ROLE_ARN_NONPROD_APP }}

      - name: Generate tag coverage report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tag-reports
          if [[ "${{ steps.tag_prereqs.outputs.skip }}" == "true" ]]; then
            printf 'Terraform tag coverage report\nSource: plan:%s\n\n%s\n' "${{ matrix.path }}" "${{ steps.tag_prereqs.outputs.reason }}" | tee "tag-reports/${{ matrix.slug }}.txt"
            exit 0
          fi
          STRICT=true make tag-plan-root ROOT="${{ matrix.path }}" TFVARS="$(basename "${{ matrix.tfvars_file }}")" | tee "tag-reports/${{ matrix.slug }}.txt"

      - name: Upload tag coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tag-report-${{ matrix.slug }}
          retention-days: 30
          path: tag-reports/${{ matrix.slug }}.txt

  tflint:
    name: tflint (${{ matrix.label }})
    if: needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache TFLint plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ hashFiles('**/tflint.hcl') }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.61.0

      - name: Init TFLint plugins
        run: tflint --chdir="${{ matrix.path }}" --init

      - name: Run TFLint
        run: tflint --chdir="${{ matrix.path }}" --format compact

  tflint-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache TFLint plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ hashFiles('**/tflint.hcl') }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.61.0

      - name: Init TFLint plugins
        run: tflint --chdir="live-validation-bootstrap" --init

      - name: Run TFLint
        run: tflint --chdir="live-validation-bootstrap" --format compact

  checkov-policy:
    name: checkov-policy (${{ matrix.label }})
    if: vars.ENABLE_CHECKOV != 'false' && needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install checkov
        run: pip install --no-cache-dir "checkov==${CHECKOV_VERSION}"

      - name: Run Checkov policy gate
        run: bash .scripts/run_checkov_gate.sh "${{ matrix.tfvars_file }}" "${{ matrix.path }}"
        env:
          OUT_DIR: security-reports/checkov-${{ matrix.slug }}

      - name: Upload Checkov artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: checkov-${{ matrix.slug }}
          retention-days: 30
          path: security-reports/checkov-${{ matrix.slug }}/

  tfsec-policy:
    name: tfsec-policy (${{ matrix.label }})
    if: vars.ENABLE_TFSEC == 'true' && needs.resolve-targets.outputs.count != '0'
    needs:
      - resolve-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install tfsec
        run: |
          tmp_bin="$(mktemp)"
          curl --retry 5 --retry-delay 2 --retry-all-errors -sSfL \
            "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64" \
            -o "${tmp_bin}"
          install -m 0755 "${tmp_bin}" /usr/local/bin/tfsec

      - name: Run tfsec policy gate
        run: bash .scripts/run_tfsec_gate.sh "${{ matrix.tfvars_file }}" "${{ matrix.path }}"
        env:
          OUT_DIR: security-reports/tfsec-${{ matrix.slug }}

      - name: Upload tfsec artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tfsec-${{ matrix.slug }}
          retention-days: 30
          path: security-reports/tfsec-${{ matrix.slug }}/

  trivy-config:
    if: vars.ENABLE_TRIVY != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # 0.24.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "json"
          output: "trivy-config.json"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          hide-progress: true

      - name: Upload Trivy config artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: trivy-config
          retention-days: 30
          path: trivy-config.json

  terrascan:
    if: vars.ENABLE_TERRASCAN == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Terrascan
        run: |
          curl -sSfL "https://github.com/tenable/terrascan/releases/download/v${TERRASCAN_VERSION}/terrascan_${TERRASCAN_VERSION}_Linux_x86_64.tar.gz" \
            -o "${RUNNER_TEMP}/terrascan.tar.gz"
          tar -xzf "${RUNNER_TEMP}/terrascan.tar.gz" -C "${RUNNER_TEMP}" terrascan
          install "${RUNNER_TEMP}/terrascan" /usr/local/bin/terrascan

      - name: Run Terrascan
        run: bash .scripts/run_terrascan.sh .
        env:
          OUT_DIR: security-reports/terrascan

      - name: Upload Terrascan artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: terrascan
          retention-days: 30
          path: security-reports/terrascan/

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-status:
    name: Terraform CI
    if: always()
    needs:
      - resolve-targets
      - terraform-fmt
      - shellcheck
      - root-parity
      - terraform-validate
      - terraform-validate-modules
      - terraform-validate-bootstrap
      - terraform-test
      - terraform-tag-report
      - tflint
      - tflint-bootstrap
      - checkov-policy
      - tfsec-policy
      - trivy-config
      - terrascan
      - gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Terraform CI result
        run: |
          python3 - <<'PY'
          import json

          needs = json.loads(r'''${{ toJson(needs) }}''')
          failures = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          if failures:
              raise SystemExit(f"Terraform CI workflow failures: {failures}")
          print("Terraform CI workflow passed.")
          PY
