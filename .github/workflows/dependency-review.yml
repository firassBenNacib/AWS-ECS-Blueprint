name: Dependabot Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-review-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect supported package manifests
        id: manifests
        run: |
          if git ls-files | grep -Eq '(^|/)(package-lock\.json|package\.json|requirements\.txt|poetry\.lock|Pipfile\.lock|pom\.xml|build\.gradle(\.kts)?|go\.mod|go\.sum|Cargo\.lock|Gemfile\.lock|composer\.lock|packages\.lock\.json|pnpm-lock\.yaml|yarn\.lock)$'; then
            echo "supported=true" >> "${GITHUB_OUTPUT}"
          else
            echo "supported=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Review changes to repository supply chain
        if: steps.manifests.outputs.supported == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: critical

      - name: Skip dependency review
        if: steps.manifests.outputs.supported != 'true'
        run: echo "No supported package manifests or lockfiles found; skipping dependency review."

  dependency-review-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect supported package manifests
        id: manifests
        run: |
          if git ls-files | grep -Eq '(^|/)(package-lock\.json|package\.json|requirements\.txt|poetry\.lock|Pipfile\.lock|pom\.xml|build\.gradle(\.kts)?|go\.mod|go\.sum|Cargo\.lock|Gemfile\.lock|composer\.lock|packages\.lock\.json|pnpm-lock\.yaml|yarn\.lock)$'; then
            echo "supported=true" >> "${GITHUB_OUTPUT}"
          else
            echo "supported=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Review changes to repository supply chain
        if: steps.manifests.outputs.supported == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: critical
          base-ref: refs/heads/main~1
          head-ref: refs/heads/main

      - name: Skip dependency review
        if: steps.manifests.outputs.supported != 'true'
        run: echo "No supported package manifests or lockfiles found; skipping dependency review."

  dependabot-scan-status:
    name: Dependabot Scan
    if: always()
    needs:
      - dependency-review-pr
      - dependency-review-push
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate dependency review result
        run: |
          python3 - <<'PY'
          import json

          needs = json.loads(r'''${{ toJson(needs) }}''')
          failures = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          if failures:
              raise SystemExit(f"Dependency review failures: {failures}")
          print("Dependency review workflow passed.")
          PY
