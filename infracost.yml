# Local Infracost project definitions for manual breakdowns.
# CI uses speculative Terraform plan JSON plus secret-backed tfvars in pr-plan.yml.
version: 0.1

projects:
  - name: prod-app
    path: prod-app
    terraform_var_files:
      - terraform.tfvars.example

  - name: nonprod-app
    path: nonprod-app
    terraform_var_files:
      - terraform.tfvars.example

  - name: live-validation-bootstrap
    path: live-validation-bootstrap
    terraform_var_files:
      - terraform.tfvars.example
